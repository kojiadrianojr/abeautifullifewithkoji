name: Deploy to GitHub Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ['main']

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
          # Generate a new cache whenever packages or source files change.
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          # If source files changed but packages didn't, rebuild from a prior cache.
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build with Next.js
        run: npm run build
        env:
          NODE_ENV: production
          # Base path for GitHub Pages (e.g., /abeautifullifewithkoji for username.github.io/abeautifullifewithkoji)
          NEXT_PUBLIC_BASE_PATH: ${{ secrets.NEXT_PUBLIC_BASE_PATH }}
          # Base URL for the application (used in API routes and image serving)
          NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
          
          # Google Forms Integration (Optional - only needed if syncing RSVPs)
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          GOOGLE_FORMS_SPREADSHEET_ID: ${{ secrets.GOOGLE_FORMS_SPREADSHEET_ID }}
          
          # Image Source Configuration (Optional - for Google Drive images)
          IMAGE_SOURCE_TYPE: ${{ secrets.IMAGE_SOURCE_TYPE }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          GOOGLE_DRIVE_HERO_ALBUM_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_HERO_ALBUM_FOLDER_ID }}
          GOOGLE_DRIVE_GALLERY_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_GALLERY_FOLDER_ID }}
          GOOGLE_DRIVE_THROWBACK_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_THROWBACK_FOLDER_ID }}
          GOOGLE_DRIVE_PRENUP_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_PRENUP_FOLDER_ID }}
          
          # Image Cache Configuration (Optional)
          IMAGE_CACHE_ENABLED: ${{ secrets.IMAGE_CACHE_ENABLED }}
          IMAGE_CACHE_DURATION: ${{ secrets.IMAGE_CACHE_DURATION }}
          CACHE_CLEAR_SECRET: ${{ secrets.CACHE_CLEAR_SECRET }}
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
